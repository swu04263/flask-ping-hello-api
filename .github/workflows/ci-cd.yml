name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test || echo "No tests"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${ secrets.SERVER_HOST }
          username: ${ secrets.SERVER_USER }
          key: ${ secrets.SERVER_SSH_KEY }
          script: |
            cd /opt/deployments/${ github.event.repository.name } || git clone ${ github.event.repository.clone_url } /opt/deployments/${ github.event.repository.name }
            cd /opt/deployments/${ github.event.repository.name }
            git pull origin main
            npm install --production
            pm2 restart ${ github.event.repository.name } 2>/dev/null || pm2 start npm --name "${ github.event.repository.name }" -- start
